# ============================================
# Docker Compose for budget-app
# Optimized for Coolify self-hosting
# ============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: budget-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_data:/app/prisma
      - app_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - budget-network

  postgres:
    image: postgres:16-alpine
    container_name: budget-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: budget
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget -d budget"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget-network

volumes:
  app_data:
    driver: local
  app_uploads:
    driver: local
  postgres_data:
    driver: local

networks:
  budget-network:
    driver: bridge

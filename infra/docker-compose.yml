version: "3.9"
services:
  redis:
    image: redis:7-alpine
    container_name: budget-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      - coolify

  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: budget-pgbouncer
    restart: always
    environment:
      PGBOUNCER_DATABASE: budget
      PGBOUNCER_PORT: 5432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
      PGBOUNCER_MAX_CLIENT_CONN: 500
      PGBOUNCER_MAX_USER_CONNECTIONS: 50
      PGBOUNCER_IDLE_TIMEOUT: 600
      PGBOUNCER_SERVER_IDLE_TIMEOUT: 600
      PGBOUNCER_SERVER_LIFETIME: 3600
      POSTGRESQL_HOST: budget-db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: ${DATABASE_USER:-postgres}
      POSTGRESQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "6432:5432"
    networks:
      - coolify
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:

networks:
  coolify:
    external: true
    name: coolify

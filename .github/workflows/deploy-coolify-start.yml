name: Deploy to Coolify (Full)

on:
  workflow_dispatch:

env:
  COOLIFY_URL: https://coolify.ashbi.ca
  APP_UUID: ok08c00scw48cgo4kgsgkkww
  COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Coolify Deploy
        run: |
          # Use `||` so curl failure (e.g. connect timeout) doesn't trip set -e.
          HTTP_CODE=$(curl --max-time 300 --connect-timeout 10 --request POST "${{ env.COOLIFY_URL }}/api/v1/applications/${{ env.APP_UUID }}/start" -H "Authorization: Bearer ${COOLIFY_TOKEN}" -H "Content-Type: application/json" -k -s -o /dev/null -w "%{http_code}" 2>/dev/null) || HTTP_CODE="curl_failed"
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Deployment triggered successfully!"
          else
            echo "WARNING: Received status $HTTP_CODE instead of 200"
            echo "Check: ${{ env.COOLIFY_URL }} is reachable from GH Actions runner"
            exit 1
          fi
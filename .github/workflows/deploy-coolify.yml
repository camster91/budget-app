name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  COOLIFY_URL: https://coolify.ashbi.ca
  APP_UUID: ok08c00scw48cgo4kgsgkkww

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          curl --request POST \
            "${{ env.COOLIFY_URL }}/api/v1/deployments/${{ env.APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -k \
            -w "\nHTTP_CODE:%{http_code}"
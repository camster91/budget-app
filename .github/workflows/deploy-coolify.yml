name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  COOLIFY_URL: https://coolify.ashbi.ca
  APP_UUID: ok08c00scw48cgo4kgsgkkww

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          response=$(curl --request POST \
            "${{ env.COOLIFY_URL }}/api/v1/applications/${{ env.APP_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -k \
            -w "\nHTTP_CODE:%{http_code}")
          body=$(echo "$response" | sed '$ d')  # remove last line (http_code)
          http_code=$(echo "$response" | tail -1 | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
          echo "$body"
          echo "HTTP status: $http_code"
          if [ "$http_code" != "200" ]; then
            exit 1
          fi
name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  COOLIFY_URL: https://coolify.ashbi.ca
  APP_UUID: ok08c00scw48cgo4kgsgkkww

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          # Trigger deployment asynchronously - don't wait for completion
          HTTP_CODE=$(curl --request POST \
            "${{ env.COOLIFY_URL }}/api/v1/applications/${{ env.APP_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -k \
            -s \
            -o /dev/null \
            -w "%{http_code}")

          echo "HTTP status: $HTTP_CODE"
          echo "Deployment triggered successfully!"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "WARNING: Received status $HTTP_CODE instead of 200"
          fi